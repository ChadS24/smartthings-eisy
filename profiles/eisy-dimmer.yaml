name: eisy-dimmer
components:
  - id: main
    capabilities:
      - id: switch
        version: 1
      - id: switchLevel
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: Light
preferences:
  - name: dimmerOnLevel
    title: Insteon on level
    description: Default local on level for the dimmer, 0-255.
    required: true
    preferenceType: integer
    definition:
      minimum: 0
      maximum: 255
      default: 255
  - name: dimmerRampRate
    title: Insteon ramp rate
    description: Default local ramp rate for the dimmer.
    required: true
    preferenceType: enumeration
    definition:
      options:
        0: "0 - 9 minutes"
        1: "1 - 8 minutes"
        2: "2 - 7 minutes"
        3: "3 - 6 minutes"
        4: "4 - 5 minutes"
        5: "5 - 4.5 minutes"
        6: "6 - 4 minutes"
        7: "7 - 3.5 minutes"
        8: "8 - 3 minutes"
        9: "9 - 2.5 minutes"
        10: "10 - 2 minutes"
        11: "11 - 1.5 minutes"
        12: "12 - 1 minute"
        13: "13 - 47 seconds"
        14: "14 - 43 seconds"
        15: "15 - 38.5 seconds"
        16: "16 - 34 seconds"
        17: "17 - 32 seconds"
        18: "18 - 30 seconds"
        19: "19 - 28 seconds"
        20: "20 - 26 seconds"
        21: "21 - 23.5 seconds"
        22: "22 - 21.5 seconds"
        23: "23 - 19 seconds"
        24: "24 - 8.5 seconds"
        25: "25 - 6.5 seconds"
        26: "26 - 4.5 seconds"
        27: "27 - 2 seconds"
        28: "28 - 0.5 seconds"
        29: "29 - 0.3 seconds"
        30: "30 - 0.2 seconds"
        31: "31 - 0.1 seconds"
      default: 31
